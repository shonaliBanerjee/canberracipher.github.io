<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.simplecss.org/simple.css">
    <link rel="stylesheet" href="styles.css">
    <title>Canberra CIPHER Robotics</title>
</head>
<body>
    <div class="container">
        <div class="navigation">
            <div class="logo">
                <picture>
                    <source srcset="Images/ourlogo.png" media="(prefers-color-scheme: light)"/>
                    <source srcset="Images/logocolourswapped.jpg" media="(prefers-color-scheme: dark)"/>
                    <img src="Images/ourlogo.png" width=100 height=40 alt="The words Canberra Cipher are displayed in all caps. The I in Cipher is replaced with the silhouette of Telstra Tower."/>
                </picture>
            </div>
            <div class="menu">
                <ul>
                    <li>Main</li>
                    <li>About Us</li>
                    <li>Our Members</li>
                    <li>Sponsors</li>
                    <li>Join The Team</li>
                    <li>Contact Us</li>
                </ul>
            </div>
        </div>
        <div class="hero-text">
            <div class="left-text">
                <h4>Canberra CIPHER</h4>
            </div>
            <div class="right-text">
                <p>We are a Canberra-based robotics team
                    affiliated with the ANU.
                </p>
            </div>
        </div>
        <div class="hero-image">
            <img src="Images/EndOf2025Comp.jpg" class="img-fluid" alt="Text spelling out Canberra Cipher, with both words in all caps and the I in Cipher replaced with a silhouette of Telstra Tower.">
        </div>
    </div>
</body>
</html>
